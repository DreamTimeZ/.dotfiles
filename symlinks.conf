# Dotfiles Symlink Configuration
#
# Format: source  target  [platform]
#
#   source    Path relative to ~/.dotfiles
#   target    Absolute path (~ expands to $HOME)
#   platform  Optional filter: macos, linux, wsl (omit = all platforms)
#
# Groups: use "# @group name" to assign entries to a group.
# Skip groups with: ./setup.sh --skip gpg bin
# Available groups: shell, tmux, editor, git, ssh, gpg, cli, bin, macos
#
# Lines starting with # are comments. Empty lines are ignored.
# Processed by setup.sh. Run: ./setup.sh --doctor to verify.

# @group shell

zsh/.zshrc                              ~/.zshrc
zsh/.zprofile                           ~/.zprofile
p10k/.p10k.zsh                          ~/.p10k.zsh
zsh/sheldon/plugins.toml                ~/.config/sheldon/plugins.toml
zsh/config/atuin/config.toml            ~/.config/atuin/config.toml

# @group tmux

tmux/.tmux.conf                         ~/.tmux.conf

# @group editor

nvim/init.lua                           ~/.config/nvim/init.lua

# @group git

git/.gitconfig                          ~/.gitconfig
git/.gitignore_global                   ~/.gitignore_global
git/local/.gitconfig.local              ~/.gitconfig.local

# @group ssh

ssh/config                              ~/.ssh/config
ssh/local/config.local                  ~/.ssh/config.local

# @group gpg

gpg/gpg.conf                            ~/.gnupg/gpg.conf
gpg/gpg-agent.conf                      ~/.gnupg/gpg-agent.conf
gpg/common.conf                         ~/.gnupg/common.conf
gpg/dirmngr.conf                        ~/.gnupg/dirmngr.conf
gpg/gpgsm.conf                          ~/.gnupg/gpgsm.conf
gpg/scdaemon.conf                       ~/.gnupg/scdaemon.conf

# @group cli

tlrc/config.toml                        ~/.config/tlrc/config.toml

# @group bin

bin/api-keys-setup                      ~/.local/bin/api-keys-setup
bin/gpg-backup                          ~/.local/bin/gpg-backup
bin/gpg-restore                         ~/.local/bin/gpg-restore

# @group macos

hammerspoon                             ~/.hammerspoon                          macos
iterm2/.iterm2_shell_integration.zsh    ~/.iterm2_shell_integration.zsh         macos
karabiner/karabiner.json                ~/.config/karabiner/karabiner.json      macos
